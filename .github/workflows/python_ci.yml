# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned @v6.0.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pinned @v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies and do a local pip install
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run test suite, with coverage
      run: |
          git config --global user.name "CI"
          git config --global user.email ""
          pytest --cov=rushd --cov-report=xml --continue-on-collection-errors
      continue-on-error: true
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # pinned @v7.0.0
      env:
          PYTHON: ${{ matrix.python-version }}
      with:
          file: ./coverage.xml
          flags: unittests
          env_vars: PYTHON
          name: github_actions
          token: ${{ secrets.CODECOV_TOKEN }}
    - name: Run test-suite in fail mode
      run: pytest --continue-on-collection-errors
    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1
