name: Build documentation

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned @v6.0.2
      with:
          fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pinned @v6.2.0
      with:
        python-version: 3.14
    - name: Install Python dependencies
      run: pip install -e .[dev]
    - name: Build documentation and deploy
      run: ./.github/workflows/build_helper.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
